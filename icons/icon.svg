<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="京都一周トレイル">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE0B2"/>
      <stop offset="1" stop-color="#FFB74D"/>
    </linearGradient>
    <linearGradient id="mountain1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#388E3C"/>
      <stop offset="1" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#66BB6A"/>
      <stop offset="1" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="72" fill="url(#sky)"/>
  <!-- sun -->
  <circle cx="380" cy="140" r="42" fill="#FFEB3B" opacity="0.9"/>
  <!-- back range with snow caps -->
  <path d="M 0 320 L 90 200 L 170 280 L 250 170 L 330 260 L 420 190 L 512 270 L 512 512 L 0 512 Z" fill="url(#mountain1)"/>
  <path d="M 230 190 L 250 170 L 270 190 L 250 200 Z" fill="#FAFAFA" opacity="0.85"/>
  <path d="M 405 210 L 420 190 L 435 210 L 420 220 Z" fill="#FAFAFA" opacity="0.85"/>
  <!-- front range -->
  <path d="M 0 400 L 70 320 L 140 380 L 210 310 L 290 390 L 360 330 L 440 390 L 512 340 L 512 512 L 0 512 Z" fill="url(#mountain2)"/>
  <!-- trail (red dashed loop across the front range) -->
  <path d="M 30 460 Q 100 410 160 440 T 280 430 T 410 430 T 490 440"
        stroke="#D32F2F" stroke-width="8" stroke-dasharray="14,10" fill="none" stroke-linecap="round"/>
  <!-- compass / current-position marker on the trail -->
  <circle cx="256" cy="436" r="18" fill="#1E88E5" stroke="#fff" stroke-width="5"/>
  <circle cx="256" cy="436" r="6" fill="#fff"/>
  <!-- "compass rose" / north triangle in the upper-left, font-free -->
  <g transform="translate(96 130)">
    <circle r="68" fill="rgba(255,255,255,0.85)" stroke="#1B5E20" stroke-width="6"/>
    <polygon points="0,-50 14,12 0,0 -14,12" fill="#D32F2F"/>
    <polygon points="0,50 14,-12 0,0 -14,-12" fill="#1B5E20"/>
  </g>
</svg>
